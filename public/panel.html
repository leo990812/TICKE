<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>工單控制面板</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <h1 class="mb-4">工單控制面板</h1>
    <form id="settingsForm">
        <div class="mb-3"><label class="form-label">伺服器 ID</label><input type="text" class="form-control" id="guildId" required></div>
        <div class="mb-3"><label class="form-label">通知角色 ID</label><input type="text" class="form-control" id="notifyRole" required></div>
        <div class="mb-3"><label class="form-label">支援角色 ID</label><input type="text" class="form-control" id="supportRole" required></div>
        <div class="mb-3"><label class="form-label">按鈕頻道 ID</label><input type="text" class="form-control" id="ticketChannel" required></div>
        <button type="submit" class="btn btn-primary">儲存設定</button>
    </form>
    <div id="msg" class="mt-3"></div>
</div>
<script>
document.getElementById("settingsForm").addEventListener("submit", async e=>{
    e.preventDefault();
    const guildId = document.getElementById("guildId").value;
    const notifyRole = document.getElementById("notifyRole").value;
    const supportRole = document.getElementById("supportRole").value;
    const ticketChannel = document.getElementById("ticketChannel").value;
    const res = await fetch(`/api/servers/${guildId}/settings`, {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({notifyRole,supportRole,ticketChannel})
    });
    const data = await res.json();
    document.getElementById("msg").innerText = data.success?"✅ 設定成功":"❌ 設定失敗";
});
</script>
</body>
</html>
