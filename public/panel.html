<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>私人小舖工單控制面板</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC&display=swap');
body {
  font-family: 'Noto Sans TC', sans-serif;
  background: linear-gradient(135deg, #1e1e2f, #14142b);
  color: #f0f0f0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  min-height: 100vh;
  padding: 50px 20px;
}

h1 {
  color: #ffcc00;
  font-size: 32px;
  margin-bottom: 40px;
}

.panel-container {
  background: #2c2c3e;
  padding: 35px 40px 40px 30px;
  border-radius: 16px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.6);
  width: 420px;
  transition: transform 0.2s;
}
.panel-container:hover { transform: translateY(-5px); }

label {
  display: block;
  margin: 18px 0 6px;
  font-weight: bold;
  font-size: 14px;
  color: #ffd700;
}

select, input[type=text], textarea, button {
  width: 100%;
  padding: 10px 14px;
  border-radius: 10px;
  border: none;
  margin-bottom: 12px;
  font-size: 14px;
  outline: none;
  transition: all 0.2s;
}

select, input[type=text], textarea {
  background-color: #1e1e2f;
  color: #f0f0f0;
}

select option {
  border-bottom: 1px solid #333;
  padding: 8px;
}
select option:hover {
  background-color: #3a3a5c;
}

select:hover, input[type=text]:hover, textarea:hover {
  background-color: #33334d;
}

textarea {
  resize: vertical;
  min-height: 100px;
}

button {
  background-color: #ffcc00;
  color: #1e1e2f;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 4px 12px rgba(255,204,0,0.4);
  transition: all 0.2s;
}

button:hover {
  background-color: #e6b800;
  box-shadow: 0 6px 18px rgba(255,204,0,0.6);
}

#status {
  margin-top: 15px;
  text-align: center;
  font-weight: bold;
  font-size: 15px;
}

/* Discord 登入按鈕 */
#login-btn, #invite-btn {
  padding: 16px 0;
  font-size: 18px;
  border-radius: 12px;
  border: none;
  background-color: #5865F2;
  color: #fff;
  cursor: pointer;
  margin-bottom: 15px;
  box-shadow: 0 4px 12px rgba(88,101,242,0.5);
  transition: 0.2s;
}
#login-btn:hover, #invite-btn:hover {
  background-color: #4752C4;
}

/* 開關樣式 */
.switch {
  position: relative;
  display: inline-block;
  width: 48px;
  height: 26px;
  margin-right: 10px;
  vertical-align: middle;
}
.switch input { display: none; }
.slider {
  position: absolute;
  cursor: pointer;
  background-color: #ccc;
  border-radius: 26px;
  top: 0; left: 0; right: 0; bottom: 0;
  transition: 0.4s;
}
.slider:before {
  position: absolute;
  content: "";
  height: 22px;
  width: 22px;
  left: 2px;
  bottom: 2px;
  background-color: white;
  border-radius: 50%;
  transition: 0.4s;
}
input:checked + .slider { background-color: #ffcc00; }
input:checked + .slider:before { transform: translateX(22px); }

#notify-role-select, #log-channel-select { display: none; }

/* 頁尾 */
.footer {
  margin-top: 40px;
  font-size: 13px;
  color: rgba(255,255,255,0.6);
  text-align: center;
}

/* Discord logo 懸浮按鈕 */
.discord-float {
  position: fixed;
  bottom: 25px;
  right: 25px;
  background-color: #5865F2;
  border-radius: 50%;
  box-shadow: 0 0 20px rgba(88,101,242,0.5);
  width: 64px;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s ease;
  cursor: pointer;
  z-index: 1000;
}
.discord-float:hover {
  transform: scale(1.1);
  background-color: #4752C4;
}
.discord-float img {
  width: 38px;
  height: 38px;
  filter: brightness(1.1);
}
</style>
</head>
<body>

<h1>私人小舖工單控制面板</h1>

<!-- 登入區 -->
<div style="margin-bottom:25px;">
  <button id="login-btn">登入 Discord</button>
</div>

<!-- 控制面板 -->
<div id="panel" class="panel-container" style="display:none;">
  <button id="invite-btn">邀請機器人加入伺服器</button>

  <label>選擇伺服器:</label>
  <select id="guild-select"></select>

  <label>發送頻道:</label>
  <select id="channel-select"></select>

  <label>
    <span class="switch">
      <input type="checkbox" id="ping-role">
      <span class="slider"></span>
    </span>
    Ping 通知角色
  </label>
  <select id="notify-role-select"></select>

  <label>查看工單權限角色:</label>
  <select id="support-role-select"></select>

  <label>
    <span class="switch">
      <input type="checkbox" id="save-log-checkbox">
      <span class="slider"></span>
    </span>
    保存工單紀錄
  </label>
  <select id="log-channel-select"></select>

  <label>按鈕上方內文:</label>
  <textarea id="ticket-top-text" placeholder="輸入按鈕上方顯示的文字..." rows="10"></textarea>

  <label>按鈕文字:</label>
  <input type="text" id="ticket-button-text" placeholder="🎫 開啟工單">

  <label>工單歡迎訊息:</label>
  <textarea id="welcome-message-content" placeholder="輸入開啟工單後的歡迎文字..." rows="10"></textarea>

  <button id="save-btn">發布</button>
  <div id="status"></div>
</div>

<div class="footer">
  製作者：Leosergo ｜ 客服聯絡：@Haven
</div>

<div class="discord-float" onclick="window.open('https://discord.gg/wrNZ9hFMT3', '_blank')">
  <img src="https://cdn.jsdelivr.net/gh/edent/SuperTinyIcons/images/svg/discord.svg" alt="Discord">
</div>

<script>
const clientId = '1426148089403805697';
const redirectUri = 'https://ticke-0cp3.onrender.com/panel.html';
const loginBtn = document.getElementById('login-btn');
const inviteBtn = document.getElementById('invite-btn');
const panel = document.getElementById('panel');
const pingCheckbox = document.getElementById('ping-role');
const notifySelect = document.getElementById('notify-role-select');
const saveLogCheckbox = document.getElementById('save-log-checkbox');
const logSelect = document.getElementById('log-channel-select');

// Discord登入
loginBtn.addEventListener('click', () => {
  const url = `https://discord.com/api/oauth2/authorize?client_id=${clientId}&redirect_uri=${encodeURIComponent(redirectUri)}&response_type=token&scope=identify%20guilds`;
  window.location.href = url;
});

// 邀請機器人按鈕
inviteBtn.addEventListener('click', () => {
  const guildSelectEl = document.getElementById('guild-select');
  const guildId = guildSelectEl.value;
  if (!guildId) return alert('請先選擇伺服器');
  const inviteUrl = `https://discord.com/oauth2/authorize?client_id=${clientId}&scope=bot&permissions=8&guild_id=${guildId}`;
  window.open(inviteUrl, '_blank');
});

// 開關切換
pingCheckbox.addEventListener('change', () => {
  notifySelect.style.display = pingCheckbox.checked ? 'inline-block' : 'none';
});
saveLogCheckbox.addEventListener('change', () => {
  logSelect.style.display = saveLogCheckbox.checked ? 'inline-block' : 'none';
});

// 初始化面板
async function initPanel() {
  if (!window.location.hash) return;
  const params = new URLSearchParams(window.location.hash.substring(1));
  const token = params.get('access_token');
  if (!token) return;

  loginBtn.style.display = 'none';
  panel.style.display = 'block';

  const guildSelectEl = document.getElementById('guild-select');
  guildSelectEl.innerHTML = '';

  let botGuilds = [];
  try {
    const res = await fetch('/api/bot/guilds');
    botGuilds = await res.json();
  } catch(e) {
    console.error('取得伺服器失敗', e);
    document.getElementById('status').innerText = '❌ 無法取得伺服器';
    return;
  }

  if (botGuilds.length === 0) {
    document.getElementById('status').innerText = '❌ 機器人尚未加入任何伺服器';
    return;
  }

  botGuilds.forEach(g => {
    const opt = document.createElement('option');
    opt.value = g.id;
    opt.textContent = g.name;
    guildSelectEl.appendChild(opt);
  });

  guildSelectEl.addEventListener('change', async function() {
    const guildId = this.value;
    if (!guildId) return;
    try {
      const res = await fetch(`/api/servers/${guildId}/info`);
      const data = await res.json();

      const channelSelect = document.getElementById('channel-select');
      const supportSelect = document.getElementById('support-role-select');

      channelSelect.innerHTML = '';
      supportSelect.innerHTML = '';
      notifySelect.innerHTML = '';
      logSelect.innerHTML = '';

      data.channels.forEach(c => {
        channelSelect.innerHTML += `<option value="${c.id}">${c.name}</option>`;
        logSelect.innerHTML += `<option value="${c.id}">${c.name}</option>`;
      });

      data.roles.forEach(r => {
        const roleName = r.name === "@everyone" ? "@everyone" : r.name;
        notifySelect.innerHTML += `<option value="${r.id}">${roleName}</option>`;
        supportSelect.innerHTML += `<option value="${r.id}">${roleName}</option>`;
      });

      notifySelect.style.display = pingCheckbox.checked ? 'inline-block' : 'none';
      logSelect.style.display = saveLogCheckbox.checked ? 'inline-block' : 'none';
    } catch(err) {
      console.error('取得頻道/角色失敗', err);
      document.getElementById('status').innerText = '❌ 無法取得頻道或角色';
    }
  });

  guildSelectEl.dispatchEvent(new Event('change'));
}

initPanel();
</script>
</body>
</html>
