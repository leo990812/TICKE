<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>私人小舖工單控制面板</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC&display=swap');
body {
    font-family: 'Noto Sans TC', sans-serif;
    background: linear-gradient(135deg, #1e1e2f, #14142b);
    color: #f0f0f0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    min-height: 100vh;
    padding: 50px 20px;
}
h1 {
    color: #ffcc00;
    font-size: 32px;
    margin-bottom: 40px;
    text-shadow: 0 0 8px rgba(255, 204, 0, 0.7);
}
.panel-container {
    background: #2c2c3e;
    padding: 35px 25px;
    border-radius: 16px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.6);
    width: 420px;
    transition: transform 0.2s;
}
.panel-container:hover { transform: translateY(-5px); }
label { display: block; margin: 18px 0 6px; font-weight: bold; font-size: 14px; color: #ffd700; }
select, input[type=text], button { width: 100%; padding: 10px 14px; border-radius: 10px; border: none; margin-bottom: 12px; font-size: 14px; outline: none; transition: all 0.2s; }
select, input[type=text] { background-color: #1e1e2f; color: #f0f0f0; }
select:hover, input[type=text]:hover { background-color: #33334d; }
button {
    background-color: #ffcc00;
    color: #1e1e2f;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(255,204,0,0.4);
}
button:hover { background-color: #e6b800; box-shadow: 0 6px 18px rgba(255,204,0,0.6); }
#status { margin-top: 15px; text-align: center; font-weight: bold; font-size: 15px; }
#login-btn { padding: 12px 20px; font-size: 16px; border-radius: 12px; border: none; background-color: #7289da; color: #fff; cursor: pointer; margin-bottom: 30px; box-shadow: 0 4px 12px rgba(114,137,218,0.5); transition: 0.2s; }
#login-btn:hover { background-color: #5b6eae; }
</style>
</head>
<body>
<h1>私人小舖工單控制面板</h1>

<button id="login-btn">登入 Discord</button>

<div id="panel" class="panel-container" style="display:none;">
  <label>選擇伺服器:</label>
  <select id="guild-select"></select>

  <label>發送頻道:</label>
  <select id="channel-select"></select>

  <label>通知角色:</label>
  <select id="notify-role-select"></select>
  <label><input type="checkbox" id="ping-role" checked> Ping 通知角色</label>

  <label>查看工單權限角色:</label>
  <select id="support-role-select"></select>

  <label>按鈕文字:</label>
  <input type="text" id="ticket-button-text" placeholder="🎫 開啟工單">

  <label>訊息內文:</label>
  <input type="text" id="ticket-message-content" placeholder="請描述問題...">

  <button id="save-btn">發布</button>
  <div id="status"></div>
</div>

<script>
const clientId = '1426148089403805697';
const redirectUri = 'https://ticke-0cp3.onrender.com/panel.html';

document.getElementById('login-btn').onclick = () => {
    const url = `https://discord.com/api/oauth2/authorize?client_id=${clientId}&redirect_uri=${encodeURIComponent(redirectUri)}&response_type=token&scope=identify`;
    window.location.href = url;
};

window.onload = async () => {
    if (window.location.hash) {
        const params = new URLSearchParams(window.location.hash.substring(1));
        const token = params.get('access_token');
        if (token) {
            document.getElementById('login-btn').style.display = 'none';
            try {
                const res = await fetch('/api/bot/guilds');
                const botGuilds = await res.json();
                const select = document.getElementById('guild-select');
                select.innerHTML = '';
                botGuilds.forEach(g => select.innerHTML += `<option value="${g.id}">${g.name}</option>`);
                if (select.options.length > 0) {
                    document.getElementById('panel').style.display = 'block';
                    select.selectedIndex = 0;
                    select.dispatchEvent(new Event('change'));
                } else {
                    document.getElementById('status').innerText = '❌ 機器人尚未加入任何伺服器';
                }
            } catch (err) {
                console.error(err);
                document.getElementById('status').innerText = '❌ 無法取得伺服器';
            }
        }
    }
};

document.getElementById('guild-select').onchange = async function() {
    const guildId = this.value;
    if (!guildId) return;
    try {
        const res = await fetch(`/api/servers/${guildId}/info`);
        const data = await res.json();

        const channelSelect = document.getElementById('channel-select');
        channelSelect.innerHTML = '';
        data.channels.forEach(c => channelSelect.innerHTML += `<option value="${c.id}">${c.name}</option>`);

        const notifySelect = document.getElementById('notify-role-select');
        const supportSelect = document.getElementById('support-role-select');
        notifySelect.innerHTML = '';
        supportSelect.innerHTML = '';
        data.roles.forEach(r => {
            const roleName = r.name === "@everyone" ? "@everyone" : r.name; // 修正 @@everyone
            notifySelect.innerHTML += `<option value="${r.id}">${roleName}</option>`;
            supportSelect.innerHTML += `<option value="${r.id}">${roleName}</option>`;
        });
    } catch (err) {
        console.error(err);
        document.getElementById('status').innerText = '❌ 無法取得頻道或角色';
    }
};

document.getElementById('save-btn').onclick = async () => {
    const guildId = document.getElementById('guild-select').value;
    const body = {
        ticketChannel: document.getElementById('channel-select').value,
        notifyRole: document.getElementById('notify-role-select').value,
        supportRole: document.getElementById('support-role-select').value,
        buttonText: document.getElementById('ticket-button-text').value || "🎫 開啟工單",
        messageContent: document.getElementById('ticket-message-content').value || "請描述問題...",
        pingRole: document.getElementById('ping-role').checked
    };
    try {
        const res = await fetch(`/api/servers/${guildId}/settings`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        const data = await res.json();
        document.getElementById('status').innerText = data.success ? '✅ 設定成功' : '❌ 設定失敗';
    } catch (err) {
        console.error(err);
        document.getElementById('status').innerText = '❌ 儲存設定失敗';
    }
};
</script>
</body>
</html>
