<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>私人小舖 控制面板</title>
<style>
body {
  font-family: "Microsoft JhengHei";
  background: #121212;
  color: #fff;
  text-align: center;
  padding: 40px;
}
.card {
  background: #1e1e1e;
  border-radius: 15px;
  padding: 30px;
  width: 600px;
  margin: 0 auto;
  box-shadow: 0 0 10px #333;
}
label { display: block; margin-top: 15px; font-weight: bold; }
input, select, textarea {
  width: 100%; padding: 10px; border: none;
  border-radius: 8px; margin-top: 5px; font-size: 15px;
}
button {
  background: #5865f2; color: white; border: none;
  border-radius: 10px; padding: 12px 20px;
  font-size: 16px; margin-top: 20px; cursor: pointer;
}
button:hover { background: #4752c4; }
</style>
</head>
<body>
  <div class="card">
    <h2>🎫 私人小舖工單機器人 控制面板</h2>

    <button id="loginBtn">登入 Discord</button>

    <div id="panel" style="display:none;">
      <label>選擇伺服器：</label>
      <select id="guildSelect"></select>

      <label>按鈕發送頻道：</label>
      <select id="ticketChannel"></select>

      <label>Ping 通知角色：</label>
      <select id="notifyRole">
        <option value="">不通知</option>
      </select>

      <label>按鈕文字：</label>
      <input id="buttonText" placeholder="🎫 開啟工單">

      <label>按鈕上方內文：</label>
      <textarea id="messageContent" placeholder="可自由輸入上方文字..."></textarea>

      <button id="saveBtn">💾 保存設定並發送訊息</button>
    </div>
  </div>

<script>
document.getElementById("loginBtn").onclick = () => {
  window.location.href = `https://discord.com/oauth2/authorize?client_id=${encodeURIComponent("${process.env.CLIENT_ID}")}&redirect_uri=${encodeURIComponent("${process.env.REDIRECT_URI}")}&response_type=code&scope=identify%20guilds`;
};
</script>
</body>
</html>
