<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>私人小舖工單控制面板</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC&display=swap');
body { font-family: 'Noto Sans TC', sans-serif; background: linear-gradient(135deg, #1e1e2f, #14142b); color: #f0f0f0; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; min-height: 100vh; padding: 50px 20px; }
h1 { color: #ffcc00; font-size: 32px; margin-bottom: 40px; text-shadow: 0 0 8px rgba(255,204,0,0.7); }
.panel-container { background: #2c2c3e; padding: 35px 25px; border-radius: 16px; box-shadow: 0 8px 30px rgba(0,0,0,0.6); width: 420px; transition: transform 0.2s; }
.panel-container:hover { transform: translateY(-5px); }
label { display: block; margin: 18px 0 6px; font-weight: bold; font-size: 14px; color: #ffd700; }
select, input[type=text], textarea, button { width: 100%; padding: 10px 14px; border-radius: 10px; border: none; margin-bottom: 12px; font-size: 14px; outline: none; transition: all 0.2s; }
select, input[type=text], textarea { background-color: #1e1e2f; color: #f0f0f0; }
select:hover, input[type=text]:hover, textarea:hover { background-color: #33334d; }
textarea { resize: vertical; height: 80px; }
button { background-color: #ffcc00; color: #1e1e2f; font-weight: bold; cursor: pointer; box-shadow: 0 4px 12px rgba(255,204,0,0.4); }
button:hover { background-color: #e6b800; box-shadow: 0 6px 18px rgba(255,204,0,0.6); }
#status { margin-top: 15px; text-align: center; font-weight: bold; font-size: 15px; }
#login-btn { padding: 12px 20px; font-size: 16px; border-radius: 12px; border: none; background-color: #7289da; color: #fff; cursor: pointer; margin-bottom: 30px; box-shadow: 0 4px 12px rgba(114,137,218,0.5); transition: 0.2s; }
#login-btn:hover { background-color: #5b6eae; }
.switch { position: relative; display: inline-block; width: 48px; height: 26px; margin-right: 10px; vertical-align: middle; }
.switch input { display: none; }
.slider { position: absolute; cursor: pointer; background-color: #ccc; border-radius: 26px; top:0; left:0; right:0; bottom:0; transition:0.4s; }
.slider:before { position:absolute; content:""; height:22px; width:22px; left:2px; bottom:2px; background-color:white; border-radius:50%; transition:0.4s; }
input:checked + .slider { background-color:#ffcc00; }
input:checked + .slider:before { transform:translateX(22px); }
#notify-role-select, #log-channel-select { display:none; }
</style>
</head>
<body>
<h1>私人小舖工單控制面板</h1>

<button id="login-btn">登入 Discord</button>

<div id="panel" class="panel-container" style="display:none;">
  <label>選擇伺服器:</label>
  <select id="guild-select"></select>

  <label>發送頻道:</label>
  <select id="channel-select"></select>

  <label>
    <span class="switch">
      <input type="checkbox" id="ping-role">
      <span class="slider"></span>
    </span>
    Ping 通知角色
  </label>
  <select id="notify-role-select"></select>

  <label>查看工單權限角色:</label>
  <select id="support-role-select"></select>

  <label>
    <span class="switch">
      <input type="checkbox" id="save-log-checkbox">
      <span class="slider"></span>
    </span>
    保存工單紀錄
  </label>
  <select id="log-channel-select"></select>

  <label>按鈕上方內文（可完全自訂）:</label>
  <textarea id="ticket-top-text" placeholder="輸入按鈕上方顯示的文字..."></textarea>

  <label>按鈕文字:</label>
  <input type="text" id="ticket-button-text" placeholder="🎫 開啟工單">

  <button id="save-btn">發布</button>
  <div id="status"></div>
</div>

<script>
const clientId = '1426148089403805697';
const redirectUri = 'https://ticke-0cp3.onrender.com/panel.html';
const loginBtn = document.getElementById('login-btn');
const panel = document.getElementById('panel');
const pingCheckbox = document.getElementById('ping-role');
const notifySelect = document.getElementById('notify-role-select');
const saveLogCheckbox = document.getElementById('save-log-checkbox');
const logSelect = document.getElementById('log-channel-select');

loginBtn.addEventListener('click', () => {
    const url = `https://discord.com/api/oauth2/authorize?client_id=${clientId}&redirect_uri=${encodeURIComponent(redirectUri)}&response_type=token&scope=identify%20guilds`;
    window.location.href = url;
});

pingCheckbox.addEventListener('change', () => {
    notifySelect.style.display = pingCheckbox.checked ? 'inline-block' : 'none';
});

saveLogCheckbox.addEventListener('change', () => {
    logSelect.style.display = saveLogCheckbox.checked ? 'inline-block' : 'none';
});

        guildSelect.appendChild(opt);
    });
