<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>工單控制面板</title>
<style>
    body {
        font-family: 'Noto Sans TC', sans-serif;
        background-color: #1e1e2f;
        color: #f0f0f0;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 40px;
    }
    h1 {
        margin-bottom: 30px;
        color: #ffcc00;
    }
    .panel-container {
        background: #2c2c3e;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 0 20px rgba(0,0,0,0.5);
        width: 400px;
    }
    label {
        display: block;
        margin: 15px 0 5px;
        font-weight: bold;
    }
    select, button {
        width: 100%;
        padding: 8px 12px;
        border-radius: 8px;
        border: none;
        margin-bottom: 10px;
        font-size: 14px;
    }
    select {
        background-color: #1e1e2f;
        color: #f0f0f0;
    }
    button {
        background-color: #ffcc00;
        color: #1e1e2f;
        font-weight: bold;
        cursor: pointer;
        transition: 0.2s;
    }
    button:hover {
        background-color: #e6b800;
    }
    #status {
        margin-top: 10px;
        text-align: center;
        font-weight: bold;
    }
</style>
</head>
<body>
<h1>自創工單控制面板</h1>

<button id="login-btn">登入 Discord</button>

<div id="panel" class="panel-container" style="display:none;">
  <label>選擇伺服器:</label>
  <select id="guild-select"></select>

  <label>選擇工單頻道:</label>
  <select id="channel-select"></select>

  <label>通知角色:</label>
  <select id="notify-role-select"></select>

  <label>支援角色:</label>
  <select id="support-role-select"></select>

  <button id="save-btn">儲存設定</button>
  <div id="status"></div>
</div>

<script>
const clientId = '1426148089403805697';
const redirectUri = 'https://ticke-0cp3.onrender.com/panel.html';

document.getElementById('login-btn').onclick = () => {
    const url = `https://discord.com/api/oauth2/authorize?client_id=${clientId}&redirect_uri=${encodeURIComponent(redirectUri)}&response_type=token&scope=identify%20guilds`;
    window.location.href = url;
};

window.onload = async () => {
    if (window.location.hash) {
        const params = new URLSearchParams(window.location.hash.substring(1));
        const token = params.get('access_token');
        if (token) {
            document.getElementById('login-btn').style.display = 'none'; // 登入後隱藏按鈕
            try {
                const res = await fetch('https://discord.com/api/users/@me/guilds', { 
                    headers: { Authorization: `Bearer ${token}` } 
                });
                const guilds = await res.json();
                const select = document.getElementById('guild-select');
                // 篩選有管理權限的伺服器
                guilds.filter(g => g.permissions & 0x20)
                      .forEach(g => select.innerHTML += `<option value="${g.id}">${g.name}</option>`);
                document.getElementById('panel').style.display = 'block';
            } catch (err) {
                console.error('取得伺服器失敗', err);
            }
        }
    }
};

// 選擇伺服器後抓頻道與角色
document.getElementById('guild-select').onchange = async function() {
    const guildId = this.value;
    if (!guildId) return;
    const res = await fetch(`/api/servers/${guildId}/info`);
    const data = await res.json();

    const channelSelect = document.getElementById('channel-select');
    channelSelect.innerHTML = '';
    data.channels.forEach(c => channelSelect.innerHTML += `<option value="${c.id}">${c.name}</option>`);

    const notifySelect = document.getElementById('notify-role-select');
    const supportSelect = document.getElementById('support-role-select');
    notifySelect.innerHTML = '';
    supportSelect.innerHTML = '';
    data.roles.forEach(r => {
        notifySelect.innerHTML += `<option value="${r.id}">${r.name}</option>`;
        supportSelect.innerHTML += `<option value="${r.id}">${r.name}</option>`;
    });
};

// 儲存設定
document.getElementById('save-btn').onclick = async () => {
    const guildId = document.getElementById('guild-select').value;
    const body = {
        ticketChannel: document.getElementById('channel-select').value,
        notifyRole: document.getElementById('notify-role-select').value,
        supportRole: document.getElementById('support-role-select').value
    };
    const res = await fetch(`/api/servers/${guildId}/settings`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
    });
    const data = await res.json();
    document.getElementById('status').innerText = data.success ? '✅ 設定成功' : '❌ 設定失敗';
};
</script>
</body>
</html>
