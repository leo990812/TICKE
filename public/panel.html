<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>私人小舖工單控制面板</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
<style>
body {
  font-family: 'Noto Sans TC', sans-serif;
  background: linear-gradient(135deg, #1e1e2f, #14142b);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  margin: 0;
}

.card {
  background: #2c2c3e;
  padding: 40px;
  border-radius: 16px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.6);
  text-align: center;
  width: 380px;
  transition: transform 0.2s;
}

.card:hover { transform: translateY(-5px); }

h1 {
  color: #ffcc00;
  margin-bottom: 30px;
}

button {
  padding: 14px 28px;
  font-size: 16px;
  font-weight: bold;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.25s;
}

#login-btn {
  background: linear-gradient(90deg,#5865F2,#4752C4);
  color: #fff;
  box-shadow: 0 6px 16px rgba(88,101,242,0.5);
}

#login-btn:hover { transform: scale(1.05); }

#invite-btn {
  background: #ffcc00;
  color: #1e1e2f;
  box-shadow: 0 4px 12px rgba(255,204,0,0.4);
  margin-bottom: 20px;
}

#invite-btn:hover {
  background-color: #e6b800;
  box-shadow: 0 6px 18px rgba(255,204,0,0.6);
}

select {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #1e1e2f;
  color: #f0f0f0;
  margin-bottom: 14px;
}
select:hover { background: #33334d; }

</style>
</head>
<body>

<div class="card" id="login-container">
  <h1>私人小舖工單控制面板</h1>
  <button id="login-btn">登入 Discord</button>
</div>

<div class="card" id="panel" style="display:none;">
  <h1>控制面板</h1>
  <button id="invite-btn">邀請機器人</button>

  <label>選擇伺服器:</label>
  <select id="guild-select"></select>
</div>

<script>
const clientId = '1426148089403805697';
const redirectUri = 'https://ticke-0cp3.onrender.com/panel.html';
const loginBtn = document.getElementById('login-btn');
const panel = document.getElementById('panel');
const loginContainer = document.getElementById('login-container');
const inviteBtn = document.getElementById('invite-btn');
const guildSelect = document.getElementById('guild-select');

// Discord 登入
loginBtn.addEventListener('click', () => {
  const url = `https://discord.com/api/oauth2/authorize?client_id=${clientId}&redirect_uri=${encodeURIComponent(redirectUri)}&response_type=token&scope=identify%20guilds`;
  window.location.href = url;
});

// 解析 URL hash token
function getToken() {
  if (!window.location.hash) return null;
  const hash = window.location.hash.substring(1);
  const params = new URLSearchParams(hash);
  return params.get("access_token");
}

// 初始化面板
async function initPanel() {
  const token = getToken();
  if (!token) return;

  loginContainer.style.display = 'none';
  panel.style.display = 'block';

  // 取得使用者伺服器列表
  const guildResp = await fetch("https://discord.com/api/users/@me/guilds", {
    headers: { Authorization: `Bearer ${token}` }
  });
  const guilds = await guildResp.json();

  guildSelect.innerHTML = '';
  guilds.forEach(g => {
    // 篩選有管理權限的伺服器
    if (g.permissions & 0x20) {
      const opt = document.createElement("option");
      opt.value = g.id;
      opt.textContent = g.name;
      guildSelect.appendChild(opt);
    }
  });

  // 更新邀請機器人連結
  function updateInviteLink() {
    inviteBtn.href = `https://discord.com/oauth2/authorize?client_id=${clientId}&scope=bot&permissions=8&guild_id=${guildSelect.value}`;
  }
  guildSelect.addEventListener('change', updateInviteLink);
  updateInviteLink();

  // 點擊邀請
  inviteBtn.addEventListener('click', (e)=>{
    e.preventDefault();
    window.open(inviteBtn.href,'_blank');
  });
}

initPanel();
</script>

</body>
</html>
